name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Syntax check all JavaScript
        run: |
          for f in api/src/functions/*.js api/src/lib/*.js widget/comments.js; do
            node --check "$f"
          done

      - name: Validate JSON files
        run: node -e "['api/host.json','api/package.json','staticwebapp.config.example.json'].forEach(f => JSON.parse(require('fs').readFileSync(f, 'utf8')))"

      - name: Unit tests
        run: node --test api/test/
